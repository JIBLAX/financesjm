<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <!-- TODO: Set the document title to the name of your application -->
    <title>Timer BE ACTIV</title>
    <meta name="description" content="Timer fitness simple et efficace pour tes entraînements by Be Activ" />
    <meta name="author" content="Be Activ" />

    <!-- TODO: Update og:title to match your application name -->
    <meta property="og:title" content="Timer Be Activ" />
    <meta property="og:description" content="Timer fitness simple et efficace pour tes entraînements by Be Activ" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Lovable" />
    <meta name="twitter:image" content="https://lovable.dev/opengraph-image-p98pqg.png" />
  </head>

  <body>
    <div id="root"></div>
    <script>
      // iOS ignore user-scalable=no depuis iOS 10 — seul preventDefault bloque réellement le zoom
      document.addEventListener('touchmove', function(e) {
        if (e.touches.length > 1) e.preventDefault()
      }, { passive: false })
      document.addEventListener('touchstart', function(e) {
        if (e.touches.length > 1) e.preventDefault()
      }, { passive: false })
      // Bloquer double-tap zoom (300ms heuristic)
      var lastTap = 0
      document.addEventListener('touchend', function(e) {
        var now = Date.now()
        if (now - lastTap < 300) e.preventDefault()
        lastTap = now
      }, { passive: false })
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
